name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Windows SDK
        run: choco install windows-sdk-10-version-2004-all -y --no-progress

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild --force

      - name: Build & publish to GitHub Releases
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
