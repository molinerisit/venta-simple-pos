<!-- renderer/windows/clientes.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Gestión de Clientes</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/productos.css" />
</head>
<body>
  <div class="container">
<aside id="sidebar-placeholder" class="sidebar"></aside>


    <main class="main-content" id="main-content">
      <header class="main-header">
        <h2>Gestión de Clientes</h2>
        <div class="header-actions">
          <input type="text" id="search-input" placeholder="Buscar cliente..." />
          <button id="btn-nuevo-cliente" class="btn btn-primario">Nuevo Cliente</button>
        </div>
      </header>
      <nav class="module-tabs">
        <a href="clientes.html" class="mod-tab active">Clientes</a>
        <a href="cuentas-corrientes.html" class="mod-tab">Cuentas Corrientes</a>
      </nav>

      <section class="content-body">
        <!-- Stat cards -->
        <div class="stat-cards">
          <div class="stat-card">
            <div class="stat-card-icon stat-card-icon--blue">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div>
              <p class="stat-card-label">Total clientes</p>
              <p class="stat-card-value" id="stat-total-clientes">—</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-icon stat-card-icon--green">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
            </div>
            <div>
              <p class="stat-card-label">Con descuento</p>
              <p class="stat-card-value" id="stat-con-descuento">—</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-icon stat-card-icon--amber">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            </div>
            <div>
              <p class="stat-card-label">Con Cta. Cte.</p>
              <p class="stat-card-value" id="stat-con-cta-cte">—</p>
            </div>
          </div>
        </div>

        <div class="table-container">
          <table id="clientes-table">
            <thead>
              <tr>
                <th>DNI</th>
                <th>Nombre</th>
                <th>Descuento (%)</th>
                <th style="text-align:right;">Acciones</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal Cliente -->
  <div id="cliente-modal" class="modal" aria-hidden="true">
    <div class="modal-contenido" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
      <h2 id="modal-titulo" class="modal-titulo">Nuevo Cliente</h2>

      <form id="cliente-form" class="modal-cuerpo">
        <input type="hidden" id="cliente-id" />
        <div class="form-campo">
          <label for="dni">DNI</label>
          <input type="text" id="dni" required />
        </div>
        <div class="form-campo">
          <label for="nombre">Nombre y Apellido</label>
          <input type="text" id="nombre" required />
        </div>
        <div class="form-campo">
          <label for="descuento">Descuento (%)</label>
          <input type="number" id="descuento" value="0" step="0.5" />
        </div>
      </form>

      <div class="modal-acciones">
        <button type="button" id="btn-cancelar-modal" class="btn btn-secundario">Cancelar</button>
        <!-- ID explícito para evitar selectores frágiles -->
        <button type="submit" id="btn-guardar-cliente" class="btn btn-primario" form="cliente-form">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-notification" class="toast"></div>

  <!-- Scripts -->
  <script defer src="../js/navbar-loader.js"></script>
  <script src="../js/form-enter-nav.js"></script>
  <script defer src="../js/clientes.js"></script>
</body>
</html>
