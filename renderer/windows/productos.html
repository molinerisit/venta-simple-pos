<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Gestión de Productos</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline';
               script-src 'self' 'unsafe-inline';
               img-src 'self' app: data:;
               connect-src 'self';">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/productos.css" />
</head>

<body>
  <div class="container">
    <aside id="sidebar-placeholder" class="sidebar"></aside>

    <main class="main-content">

      <!-- ── Header ─────────────────────────────────────────── -->
      <header class="main-header">
        <div class="header-left">
          <div class="page-icon-badge">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
          </div>
          <div>
            <h1 class="page-title">
              Productos
              <span id="contador-productos" class="counter-chip"></span>
            </h1>
            <p class="page-sub">Administrá precios, stock y catálogo</p>
          </div>
        </div>

        <div class="header-actions">
          <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Buscar nombre, código..." />
          </div>
          <select id="filter-sort" class="filter-select">
            <option value="nombre">Nombre (A-Z)</option>
            <option value="recientes">Recién Agregados</option>
            <option value="margen_asc">Menor Margen</option>
            <option value="vencimiento_asc">Próximos a Vencer</option>
            <option value="stock_asc">Menor Stock</option>
            <option value="sin_costo">Sin Precio Costo</option>
          </select>
          <a href="registrar-compra-productos.html" class="btn btn-secundario btn-sm">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            Compra de Productos
          </a>
          <button id="btn-nuevo-producto" class="btn btn-primario btn-sm">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nuevo Producto
          </button>
        </div>
      </header>

      <!-- ── Tabs ───────────────────────────────────────────── -->
      <nav class="module-tabs">
        <a href="productos.html" class="mod-tab active">Productos</a>
        <a href="etiquetas.html" class="mod-tab">Etiquetas</a>
        <a href="insumos.html" class="mod-tab">Insumos</a>
        <a href="lotes.html" class="mod-tab">Lotes</a>
        <a href="ofertas.html" class="mod-tab">Ofertas</a>
      </nav>

      <section class="content-body">

        <!-- ── Filter pills ────────────────────────────────── -->
        <div class="filter-pills" id="filter-activo-pills">
          <button class="pill pill--active" data-filtro="todos">Todos</button>
          <button class="pill" data-filtro="activo">Activos</button>
          <button class="pill" data-filtro="inactivo">Sin precio</button>
        </div>

        <!-- ── Stat cards ──────────────────────────────────── -->
        <div class="stat-cards">
          <div class="stat-card">
            <div class="stat-card-icon stat-card-icon--blue">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </div>
            <div>
              <p class="stat-card-label">Total Productos</p>
              <p class="stat-card-value" id="stat-total">—</p>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-card-icon stat-card-icon--amber">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <div>
              <p class="stat-card-label">Stock Crítico</p>
              <p class="stat-card-value" id="stat-stock-critico">—</p>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-card-icon stat-card-icon--red">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <div>
              <p class="stat-card-label">Próximos a Vencer</p>
              <p class="stat-card-value" id="stat-vencimiento">—</p>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-card-icon stat-card-icon--green">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div>
              <p class="stat-card-label">Sin Precio Costo</p>
              <p class="stat-card-value" id="stat-sin-costo">—</p>
            </div>
          </div>
        </div>

        <!-- ── Alert summary ───────────────────────────────── -->
        <div id="alertas-container"></div>

        <!-- ── Table ───────────────────────────────────────── -->
        <div class="table-container">
          <table id="productos-table">
            <thead>
              <tr>
                <th>Producto</th>
                <th>Catálogo</th>
                <th>Stock</th>
                <th style="text-align:right;">Precio Venta</th>
                <th>Margen</th>
                <th>Estado</th>
                <th style="text-align:right;">Acciones</th>
              </tr>
            </thead>
            <tbody id="productos-table-body"></tbody>
          </table>
        </div>

      </section>
    </main>
  </div>

  <script src="../js/ui-notifications.js"></script>
  <script defer src="../js/navbar-loader.js"></script>
  <script defer src="../js/productos.js"></script>
</body>
</html>
