<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Gestión de Productos</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline';
                 script-src 'self' 'unsafe-inline';
                 img-src 'self' app: data:;
                 connect-src 'self';">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/productos.css" />
  <style>
    /* Estilos de Alertas */
    .alertas-container {
      padding: 0 1rem;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: .5rem
    }

    .alerta {
      padding: .75rem 1.25rem;
      border-radius: .25rem;
      border: 1px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .alerta.stock {
      color: #856404;
      background-color: #fff3cd;
      border-color: #ffeeba
    }

    .alerta.vencimiento {
      color: #721c24;
      background-color: #f8d7da;
      border-color: #f5c6cb
    }

    .alerta-cerrar {
      background: none;
      border: none;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      color: inherit;
      opacity: .7
    }

    .alerta-cerrar:hover {
      opacity: 1
    }

  </style>
</head>

<body>
  <div class="container">
    <aside id="sidebar-placeholder" class="sidebar"></aside>

    <main class="main-content">
      <div id="alertas-container" class="alertas-container"></div>

      <header class="main-header">
        <h2>
          Gestión de Productos
          <span id="contador-productos" class="contador-titulo"></span>
        </h2>

        <div class="header-actions">
          <select id="filter-sort" class="form-select-sort">
    <option value="nombre">🔤 Nombre (A-Z)</option>
    <option value="recientes">🆕 Recién Agregados</option>
    <option value="margen_asc">📉 Menor Margen (Críticos)</option>
    <option value="vencimiento_asc">📅 Próximos a Vencer</option>
    <option value="stock_asc">📦 Menor Stock</option>
    <option value="sin_costo">⚠️ Sin Precio Compra</option>
  </select>
          <input type="text" id="search-input" placeholder="Buscar por nombre o código..." />
          <a href="registrar-compra-productos.html" class="btn btn-info">Compra de Productos</a>
          <button id="btn-nuevo-producto" class="btn btn-primario">+ Nuevo Producto</button>
        </div>
      </header>
      <nav class="module-tabs">
        <a href="productos.html" class="mod-tab active">Productos</a>
        <a href="etiquetas.html" class="mod-tab">Etiquetas</a>
        <a href="insumos.html" class="mod-tab">Insumos</a>
        <a href="lotes.html" class="mod-tab">Lotes</a>
      </nav>

      <section class="content-body">

        <div class="table-container">
          <table id="productos-table">
            <thead>
              <tr>
                <th style="width:5%;">Margen</th>
                <th style="width:12%;">Cód. Barras</th>
                <th>Nombre</th>
                <th>Departamento</th>
                <th>Familia</th>
                <th>Código</th>
                <th>Stock</th>
                <th>Precio Venta</th>
                <th style="text-align:center;">Estado</th>
                <th style="text-align:right;">Acciones</th>
              </tr>
            </thead>
            <tbody id="productos-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script defer src="../js/navbar-loader.js"></script>
  <script defer src="../js/productos.js"></script>

  <div id="toast-notification" class="toast"></div>
</body>

</html>
