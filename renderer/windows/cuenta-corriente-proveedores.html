<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cuenta Corriente Proveedores</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline';
                 script-src 'self' 'unsafe-inline';
                 img-src 'self' app: data:;
                 connect-src 'self';">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/cuentas-corrientes.css" />
</head>
<body>
  <div class="container">
    <aside id="sidebar-placeholder" class="sidebar"></aside>

    <main class="main-content">

      <!-- ── Header ──────────────────────────────────────────── -->
      <header class="main-header">
        <div class="header-left">
          <div class="page-icon-badge" style="background:#d97706;">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="1" y="3" width="15" height="13"/>
              <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
              <circle cx="5.5" cy="18.5" r="2.5"/>
              <circle cx="18.5" cy="18.5" r="2.5"/>
            </svg>
          </div>
          <div>
            <h1 class="page-title">Cuenta Corriente</h1>
            <p class="page-sub">Deudas con proveedores</p>
          </div>
        </div>
      </header>

      <!-- ── Sub-nav ──────────────────────────────────────────── -->
      <nav class="module-tabs">
        <a href="proveedores.html" class="mod-tab">Proveedores</a>
        <a href="cuenta-corriente-proveedores.html" class="mod-tab active">Cuenta Corriente</a>
      </nav>

      <section class="content-body">

        <!-- ── Tarjetas de resumen ────────────────────────────── -->
        <div class="stat-cards">
          <div class="stat-card">
            <div class="stat-card-icon stat-card-icon--amber">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="1" x2="12" y2="23"/>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
            </div>
            <div>
              <p class="stat-card-label">Total deuda</p>
              <p class="stat-card-value" id="stat-total-deuda">—</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-icon stat-card-icon--red">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="1" y="3" width="15" height="13"/>
                <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
                <circle cx="5.5" cy="18.5" r="2.5"/>
                <circle cx="18.5" cy="18.5" r="2.5"/>
              </svg>
            </div>
            <div>
              <p class="stat-card-label">Proveedores con deuda</p>
              <p class="stat-card-value" id="stat-proveedores-deuda">—</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-icon stat-card-icon--green">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 12 20 22 4 22 4 12"/>
                <rect x="2" y="7" width="20" height="5"/>
                <line x1="12" y1="22" x2="12" y2="7"/>
                <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>
                <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
              </svg>
            </div>
            <div>
              <p class="stat-card-label">Abonos del mes</p>
              <p class="stat-card-value" id="stat-abonos-mes">—</p>
            </div>
          </div>
        </div>

        <!-- ── Tabla proveedores ──────────────────────────────── -->
        <div class="cc-table-wrap">
          <table class="cc-table" id="proveedores-deuda-table">
            <thead>
              <tr>
                <th>Proveedor</th>
                <th>Repartidor</th>
                <th>Deuda Total</th>
                <th>Último movimiento</th>
                <th class="th-right">Acciones</th>
              </tr>
            </thead>
            <tbody id="proveedores-deuda-tbody"></tbody>
          </table>
        </div>

      </section>
    </main>
  </div>

  <!-- Modal de abono -->
  <div id="pago-modal" class="modal">
    <div class="modal-contenido" style="max-width: 460px;">
      <h2 id="pago-modal-titulo" class="modal-titulo">Registrar Abono a Proveedor</h2>
      <div class="modal-cuerpo">
        <p><strong>Proveedor:</strong> <span id="pago-modal-entidad"></span></p>
        <p><strong>Deuda Actual:</strong> <strong id="pago-modal-deuda-actual"></strong></p>
        <hr />
        <div class="form-campo">
          <label for="pago-modal-monto">Monto a abonar:</label>
          <input type="number" id="pago-modal-monto" step="0.01" inputmode="decimal" min="0" required />
          <small id="pago-modal-help" class="text-muted"></small>
        </div>
      </div>
      <div class="modal-acciones">
        <button type="button" id="pago-modal-cancelar" class="btn btn-secundario">Cancelar</button>
        <button type="button" id="pago-modal-confirmar" class="btn btn-success">Confirmar</button>
      </div>
    </div>
  </div>

  <div id="toast-notification" class="toast"></div>

  <script src="../js/ui-notifications.js"></script>
  <script defer src="../js/navbar-loader.js"></script>
  <script defer src="../js/cuenta-corriente-proveedores.js"></script>
  <script>
    document.addEventListener('app-ready', () => {
      const link = document.querySelector('nav a[href="proveedores.html"]');
      if (link) link.setAttribute('aria-current', 'page');
    });
  </script>
</body>
</html>
