<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venta Simple — Configuración Inicial</title>
  <link rel="stylesheet" href="../css/setup.css" />
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo-wrap">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
    </div>

    <h1 class="auth-brand">Configuración Inicial</h1>
    <p class="auth-subtitle">Creá la cuenta del administrador para comenzar a usar el sistema</p>

    <form id="setup-form" autocomplete="off" novalidate>
      <div class="field-group">
        <label for="nombre">Nombre de usuario</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          placeholder="Ej: admin"
          autofocus
          autocomplete="off"
        />
      </div>

      <div class="field-group">
        <label for="email">
          Correo electrónico
          <span class="field-optional">(opcional)</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="ej: admin@minegocio.com"
          autocomplete="email"
        />
      </div>

      <div class="field-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Elegí una contraseña segura"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-password" tabindex="-1" aria-label="Mostrar contraseña">
            <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="message" class="auth-message" role="alert"></div>

      <button type="submit" class="setup-button">Crear y Empezar</button>
    </form>
  </div>
  <div class="auth-card" id="card-negocio" style="display:none;">
    <div class="auth-logo-wrap">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
    </div>
    <h1 class="auth-brand">Tu Negocio</h1>
    <p class="auth-subtitle">Completá los datos de tu negocio — aparecerán en los tickets</p>
    <form id="negocio-form" autocomplete="off" novalidate>
      <div class="field-group">
        <label for="neg-nombre">Nombre del negocio</label>
        <input type="text" id="neg-nombre" placeholder="Ej: Almacén El Sol" autofocus autocomplete="off" />
      </div>
      <div class="field-group">
        <label for="neg-direccion">Dirección</label>
        <input type="text" id="neg-direccion" placeholder="Ej: Av. San Martín 1234, Buenos Aires" autocomplete="off" />
      </div>
      <div id="negocio-message" class="auth-message" role="alert"></div>
      <button type="submit" class="setup-button">Guardar y Comenzar</button>
      <button type="button" id="btn-skip-negocio" class="setup-button" style="margin-top:8px;background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;">
        Omitir por ahora
      </button>
    </form>
  </div>

  <p class="auth-footer">Venta Simple · Sistema de Punto de Venta</p>
  <script src="../js/form-enter-nav.js"></script>
  <script src="../js/setup.js" defer></script>
  <script src="../js/ui-notifications.js"></script>
</body>
</html>
