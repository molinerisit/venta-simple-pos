<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venta Simple — Iniciar Sesión</title>
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>
  <div class="auth-card">

    <div class="auth-logo-wrap">
      <img
        id="auth-logo-img"
        class="auth-logo-circle"
        src="../images/ventasimple.png"
        alt="Logo del negocio"
        draggable="false"
      />
    </div>

    <h1 class="auth-brand" id="auth-brand-name">Venta Simple</h1>
    <p class="auth-subtitle">Iniciá sesión para continuar</p>

    <form id="login-form" autocomplete="off" novalidate>
      <div class="field-group">
        <label for="username">Usuario o Email</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Usuario o dirección de email"
          autofocus
          autocomplete="off"
        />
      </div>

      <div class="field-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Ingresá tu contraseña"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-password" tabindex="-1" aria-label="Mostrar contraseña">
            <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <label class="remember-label">
          <input type="checkbox" id="remember-me" />
          <span>Recordar usuario y contraseña</span>
        </label>
      </div>

      <p id="error-message" class="auth-error" role="alert"></p>
      <p id="error-msg" class="auth-error" role="alert"></p>

      <button type="submit" class="login-button">Ingresar</button>
      <button type="button" id="btn-forgot-password" class="btn-forgot">¿Olvidaste tu contraseña?</button>
      <button type="button" id="btn-create-admin" class="btn-forgot" style="display:none; margin-top:6px; color:#64748b;">Primera vez · Crear administrador →</button>
    </form>

    <!-- ── Panel de recuperación (oculto por defecto) ── -->
    <div id="recovery-panel" class="recovery-panel" style="display:none">

      <!-- Paso 1: solicitar envío del código -->
      <div id="recovery-step-1">
        <p class="recovery-desc">Te enviaremos un código de 6 dígitos al correo registrado del administrador.</p>
        <p id="rec-error-1" class="auth-error" role="alert"></p>
        <button id="btn-send-token" class="login-button">Enviar código</button>
      </div>

      <!-- Paso 2: ingresar el código -->
      <div id="recovery-step-2" style="display:none">
        <p id="rec-sent-msg" class="recovery-desc"></p>
        <div class="field-group">
          <label for="rec-token-input">Código de verificación</label>
          <input
            type="text"
            id="rec-token-input"
            class="token-input"
            maxlength="6"
            inputmode="numeric"
            pattern="[0-9]*"
            placeholder="000000"
            autocomplete="one-time-code"
          />
        </div>
        <p id="rec-error-2" class="auth-error" role="alert"></p>
        <button id="btn-verify-token" class="login-button">Verificar código</button>
      </div>

      <!-- Paso 3: nueva contraseña -->
      <div id="recovery-step-3" style="display:none">
        <p class="recovery-desc">Ingresá tu nueva contraseña.</p>
        <div class="field-group">
          <label for="rec-new-pass">Nueva contraseña</label>
          <div class="password-wrapper">
            <input type="password" id="rec-new-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
            <button type="button" class="toggle-password" tabindex="-1" aria-label="Mostrar contraseña">
              <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="field-group">
          <label for="rec-confirm-pass">Confirmar contraseña</label>
          <input type="password" id="rec-confirm-pass" placeholder="Repetí la contraseña" autocomplete="new-password" />
        </div>
        <p id="rec-error-3" class="auth-error" role="alert"></p>
        <button id="btn-reset-password" class="login-button">Cambiar contraseña</button>
      </div>

      <button type="button" id="btn-back-to-login" class="btn-forgot" style="margin-top:14px">← Volver al inicio de sesión</button>
    </div>

  </div>
  <p class="auth-footer">Venta Simple · Sistema de Punto de Venta</p>
  <script src="../js/form-enter-nav.js"></script>
  <script src="../js/login.js"></script>
  <script src="../js/ui-notifications.js"></script>
</body>
</html>
