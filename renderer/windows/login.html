<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venta Simple — Iniciar Sesión</title>
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>
  <div class="auth-card">

    <div class="auth-logo-wrap">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
      </div>
    </div>

    <h1 class="auth-brand">Venta Simple</h1>
    <p class="auth-subtitle">Iniciá sesión para continuar</p>

    <form id="login-form" autocomplete="off" novalidate>
      <div class="field-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Ingresá tu usuario"
          autofocus
          autocomplete="off"
        />
      </div>

      <div class="field-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Ingresá tu contraseña"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-password" tabindex="-1" aria-label="Mostrar contraseña">
            <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <p id="error-message" class="auth-error" role="alert"></p>
      <p id="error-msg" class="auth-error" role="alert"></p>

      <button type="submit" class="login-button">Ingresar</button>
    </form>
  </div>
  <p class="auth-footer">Venta Simple · Sistema de Punto de Venta</p>
  <script src="../js/form-enter-nav.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
