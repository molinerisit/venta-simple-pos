<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Transacciones de Mercado Pago</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/mp_transactions.css">

    <!-- 🟢 INICIO: CORRECCIÓN DE SCROLL 🟢 -->
    <style>
        .table-container {
            /*
              Esto establece una altura máxima para el contenedor de la tabla.
              '65vh' significa 65% de la altura de la ventana.
              Si el contenido de la tabla (tbody) supera esta altura,
              aparecerá una barra de scroll vertical SÓLO en este div.
            */
            max-height: 65vh;
            overflow-y: auto; /* Muestra el scrollbar vertical si es necesario */
        }
    </style>
    <!-- 🟢 FIN: CORRECCIÓN DE SCROLL 🟢 -->

</head>
<body>
    <div class="container">
         <aside id="sidebar-placeholder" class="sidebar"></aside>

        <main class="main-content">
            <header class="main-header">
              <h1 class="page-title">Ventas</h1>
            </header>
            <nav class="module-tabs">
              <a href="reportes.html" class="mod-tab">Historial</a>
              <a href="mp_transactions.html" class="mod-tab active">Transacciones MP</a>
            </nav>

            <div class="content-body">
            <!-- Contenedor unificado tipo "card" -->
            <div class="card">

                <header>
                    <h1>Transacciones de Mercado Pago</h1>
                </header>
                
                <!-- Eliminé el h1 vacío, puedes agregarlo si era para espaciado -->

                <div class="filter-container">
                    <form id="filter-form">
                        <div class="form-field">
                            <label for="range">Rango de Fechas</label>
                            <select id="range" name="range">
                                <option value="today">Hoy</option>
                                <option value="last7days">Últimos 7 días</option>
                                <option value="last30days">Últimos 30 días</option>
                                <option value="all" selected>Siempre</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label for="status">Estado</label>
                            <select id="status" name="status">
                                <option value="">Todos</option>
                                <option value="approved">Aprobado</option>
                                <option value="pending">Pendiente</option>
                                <!-- 🟢 INICIO: OPCIONES AÑADIDAS 🟢 -->
                                <option value="rejected">Rechazado</option>
                                <option value="refunded">Reembolsado</option>
                                <!-- 🟢 FIN: OPCIONES AÑADIDAS 🟢 -->
                            </select>
                        </div>
                        <div class="filter-actions">
                            <button type="submit" class="btn-primario">Filtrar</button>
                            <button type="button" id="btn-refresh" class="btn-secondary">🔄 Actualizar</button>
                        </div>
                    </form>
                </div>

                <div class="table-container">
                    <table id="transactions-table">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Pagador</th>
                                <th>Descripción / Referencia</th>
                                <th>Monto</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Las filas se generarán con JS -->
                        </tbody>
                    </table>
                </div>
            </div>
            </div><!-- /.content-body -->
        </main>
    </div>

    <script src="../js/navbar-loader.js"></script>
    <script src="../js/mp_transactions.js"></script>
    <script>
      document.addEventListener('app-ready', () => {
        const link = document.querySelector('nav a[href="reportes.html"]');
        if (link) link.setAttribute('aria-current', 'page');
      });
    </script>
  <script src="../js/ui-notifications.js"></script>
</body>
</html>
